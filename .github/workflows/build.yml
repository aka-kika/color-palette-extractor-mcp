name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build (node ${{ matrix.node-version }})
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/server.js
          test -f dist/extract.js
          test -f dist/window.js
          test -f dist/build.js
          echo "✓ all build artifacts present"

      - name: Smoke-test server (initialize handshake)
        uses: actions/github-script@v7
        with:
          script: |
            const { spawn } = require('child_process');
            const child = spawn('node', ['dist/server.js'], { stdio: ['pipe', 'pipe', 'pipe'] });
            let stdout = '';
            let stderr = '';
            child.stdout.on('data', d => stdout += d.toString());
            child.stderr.on('data', d => stderr += d.toString());

            // Send a minimal MCP initialize request, then list_tools, then exit.
            const req = JSON.stringify({
              jsonrpc: '2.0', id: 1, method: 'initialize',
              params: {
                protocolVersion: '2024-11-05',
                capabilities: {},
                clientInfo: { name: 'ci', version: '0' },
              },
            }) + '\n';

            await new Promise((resolve) => {
              setTimeout(() => {
                child.stdin.write(req);
                setTimeout(resolve, 1500);
              }, 300);
            });

            child.kill();

            // The server should have responded with an initialize result containing serverInfo.
            let parsed;
            try {
              const line = stdout.split('\n').filter(Boolean).pop();
              parsed = JSON.parse(line);
            } catch (e) {
              core.setFailed(`Server stdout was not valid JSON: ${stdout.slice(0, 200)}`);
              return;
            }

            if (parsed.result && parsed.result.serverInfo && parsed.result.serverInfo.name === 'color-palette-mcp') {
              core.info(`✓ server boots and responds: ${parsed.result.serverInfo.name} v${parsed.result.serverInfo.version}`);
            } else {
              core.setFailed(`Server did not respond correctly. stderr: ${stderr.slice(0, 500)}, parsed: ${JSON.stringify(parsed).slice(0, 500)}`);
            }